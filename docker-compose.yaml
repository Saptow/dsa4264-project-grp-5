services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
    - ./results:/app/results
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=your-secret-key
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  open-webui: